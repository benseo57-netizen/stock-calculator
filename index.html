<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1000" />
    <title>Payable Rate 계산기</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #F0F4F8; min-width: 1000px; }
      input[type=number] { -moz-appearance: textfield; }
      input[type=number]::-webkit-inner-spin-button,
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
const { useState, useContext, createContext } = React;

const FxCtx = createContext({ openId: null, setOpenId: () => {} });
const LI_CONV = 1 / 0.188;  // Li₂CO₃ 환산: Li함량 ÷ 18.8% (Li₂CO₃ 내 Li 비율)
const f0 = n => (n == null || isNaN(n) || !isFinite(n)) ? "—" : Math.round(n).toLocaleString("ko-KR");
const fp = (n, d=1) => (n == null || isNaN(n) || !isFinite(n)) ? "—" : n.toFixed(d) + "%";
const fa = n => (n == null || isNaN(n) || !isFinite(n)) ? "—" : (n / 1e8).toFixed(1) + "억";
const num = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };

function compute(inp) {
  const er  = num(inp.exchangeRate);
  const coP = num(inp.coUSD) * 2.20462 * er;  // $/lb → ₩/kg (성일 기준: ×2.20462)
  const niP = (num(inp.niUSD) / 1000) * er;
  const liP = num(inp.liUSD) * er;
  const pr  = num(inp.powderRatio) / 100;
  const cor = num(inp.coRecovery) / 100;
  const nir = num(inp.niRecovery) / 100;
  const lir = num(inp.liRecovery) / 100;
  const coC = num(inp.coContent) / 100;
  const niC = num(inp.niContent) / 100;
  const liC = num(inp.liContent) / 100;
  // 회수 후 output (변동 가공비 계산 기준)
  const coOut = coC * pr * cor;
  const niOut = niC * pr * nir;
  const liOut = liC * LI_CONV * pr * lir;
  const coVal = coOut * coP;
  const niVal = niOut * niP;
  const liVal = liOut * liP;
  const totOut  = coVal + niVal + liVal;

  // 함량 기준 가치 (contained value, 회수율 미적용 — Payable Rate 분모)
  const coContained  = coC * pr * coP;
  const niContained  = niC * pr * niP;
  const liContained  = liC * LI_CONV * pr * liP;
  const coNiContained  = coContained + niContained;
  const totContained   = coContained + niContained + liContained;
  // 하위 호환용 (output 표시용)
  const coNiOut = coVal + niVal;
  const wetTotal = coOut * num(inp.coWetCost) + niOut * num(inp.niWetCost) + liOut * num(inp.liWetCost);
  const preV    = num(inp.preProcessCost);
  const localV  = num(inp.localLogistics);
  const intlV   = num(inp.intlLogistics);
  const krV     = num(inp.krLocalLogistics);
  const calcV   = num(inp.calcinationCost);
  const otherV  = num(inp.otherVarCost);
  const byproduct = num(inp.byproductRevenue);
  const totVar  = preV + wetTotal + localV + intlV*pr + krV*pr + calcV*pr + otherV;
  const payable = totOut - totVar + byproduct;
  // Payable Rate = payable ÷ 함량가치 (시장 관행: contained value 기준)
  // 소수점 2자리 반올림 후 CoNiLi는 CoNi 경유 계산 → 두 시트 일치
  const ratioCoNi   = coNiContained > 0 ? Math.round((payable / coNiContained) * 1000) / 10 : NaN;
  const ratioCoNiLi = (coNiContained > 0 && totContained > 0)
    ? Math.round(ratioCoNi * (coNiContained / totContained) * 10) / 10 : NaN;
  const mktRatio    = num(inp.marketRatioCoNi);
  // 시장 매입단가 = 함량가치 × 시장 Rate (contained value 기준)
  const marketPrice = coNiContained * (mktRatio / 100);
  const cmKg        = payable - marketPrice;
  const vol         = num(inp.monthlyVolume);
  const fixedCost   = num(inp.monthlyFixedCost) * 1e8;
  const cmMon       = cmKg * vol * 1000;
  const fixedPerKg  = fixedCost > 0 && vol > 0 ? fixedCost / (vol * 1000) : 0;
  const covPct      = fixedCost > 0 ? (cmMon / fixedCost) * 100 : NaN;
  const actualPrice = num(inp.actualPrice);
  const varMargin   = payable - actualPrice;
  const varMarginPct  = totOut > 0 ? (varMargin / totOut) * 100 : NaN;
  const fullMargin    = varMargin - fixedPerKg;
  const fullMarginPct = totOut > 0 ? (fullMargin / totOut) * 100 : NaN;
  return {
    coP, niP, liP, pr, coOut, niOut, liOut,
    coVal, niVal, liVal, totOut, coNiOut,
    coContained, niContained, liContained, coNiContained, totContained,
    wetTotal, preV, localV, intlV, krV, calcV, otherV, byproduct, totVar,
    payable, ratioCoNi, ratioCoNiLi,
    mktRatio, marketPrice, cmKg, cmMon, fixedCost, fixedPerKg, covPct,
    actualPrice, varMargin, varMarginPct, fullMargin, fullMarginPct,
  };
}

const C = {
  // 레이아웃
  bg:       "#F0F4F8",   // 앱 배경 — 연한 회청색
  card:     "#FFFFFF",   // 카드 흰색
  border:   "#CBD5E1",   // 테두리

  // 강조색 (밝은 배경 위에서 쓰는 색)
  amber:    "#B45309",   // 앰버 — 흰배경에서 가독성 확보
  blue:     "#1D4ED8",   // 블루
  green:    "#065F46",   // 그린
  red:      "#B91C1C",   // 레드
  purple:   "#6D28D9",   // 퍼플

  // 텍스트 (밝은 배경 위)
  text:     "#0F172A",   // 메인 텍스트 (거의 검정)
  muted:    "#475569",   // 보조 텍스트
  dim:      "#94A3B8",   // 흐린 텍스트
  vdim:     "#CBD5E1",   // 매우 흐림

  // 헤더 (어두운 배경 → 반드시 밝은 글씨)
  headerBg:   "#0F172A", // 거의 검정
  headerText: "#F8FAFC", // 거의 흰색

  // Sec 헤더 배경
  secBg:    "#F8FAFC",

  // 입력 필드
  inputBorder: "#94A3B8",

  // 계산결과 행 배경
  calcBg:  "#F0FDF4",
  boldBg:  "#DCFCE7",

  // 입력 강조 행 (highlight)
  highlightBg: "#FFFBEB",
  accentBg:    "#EFF6FF",
};

const TAGS = {
  변동:    { bg:"#D1FAE5", fg:"#064E3B" },
  직접경비: { bg:"#E0F2FE", fg:"#0C4A6E" },
  간접경비: { bg:"#EDE9FE", fg:"#4C1D95" },
};

function Tag({ t }) {
  const d = TAGS[t];
  if (!d) return null;
  return (
    <span style={{ fontSize:11, fontWeight:700, padding:"1px 5px", borderRadius:3,
      background:d.bg, color:d.fg, marginLeft:3, flexShrink:0, whiteSpace:"nowrap" }}>
      {t}
    </span>
  );
}

function Sec({ label, color }) {
  return (
    <div style={{ padding:"6px 12px", marginTop:8, fontSize:12, fontWeight:700,
      letterSpacing:"0.07em", color:color||C.amber,
      borderLeft:"3px solid "+(color||C.amber), background:"#F8FAFC",
      borderBottom:"1px solid "+C.border }}>
      {label}
    </div>
  );
}

function Fx({ id, text }) {
  const { openId, setOpenId } = useContext(FxCtx);
  const open = openId === id;
  return (
    <span style={{ display:"inline-flex", alignItems:"center", marginLeft:4, position:"relative" }}>
      <button onClick={e => { e.stopPropagation(); setOpenId(open ? null : id); }}
        style={{ fontSize:11, padding:"0 5px", borderRadius:3, cursor:"pointer",
          background:open?"#1E293B":"#E2E8F0", color:open?"#F0F9FF":"#475569",
          border:"1px solid "+(open?"#1E3A8A":C.border) }}>fx</button>
      {open && (
        <span onClick={e => e.stopPropagation()}
          style={{ position:"absolute", top:"100%", left:0, zIndex:50, marginTop:4,
            background:"#1E293B", border:"1px solid #334155", borderRadius:6,
            padding:"7px 10px", fontSize:12, color:"#E2E8F0", width:260,
            whiteSpace:"pre-wrap", lineHeight:1.7, boxShadow:"0 4px 20px rgba(0,0,0,0.25)" }}>
          {text}
        </span>
      )}
    </span>
  );
}

function IRow({ label, value, onChange, unit, note, tags, accent, highlight, formula }) {
  return (
    <div style={{ display:"flex", alignItems:"flex-start", gap:4,
      padding:"6px 10px", borderBottom:"1px solid "+C.border,
      background:highlight?"#FFFBEB":accent?"#EFF6FF":"#FFFFFF" }}>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", alignItems:"center", flexWrap:"wrap", gap:2, position:"relative" }}>
          <span style={{ fontSize:13, color:C.text, fontWeight:500 }}>{label}</span>
          {tags && tags.map(t => <Tag key={t} t={t} />)}
          {formula && <Fx id={label+unit} text={formula} />}
        </div>
        {note && <div style={{ fontSize:11, color:C.muted, marginTop:2, whiteSpace:"pre-line" }}>{note}</div>}
      </div>
      <input type="number" step="any" value={value} onClick={e=>e.stopPropagation()} onChange={e => onChange(e.target.value)}
        style={{ width:88, padding:"3px 7px", fontSize:14, textAlign:"right",
          background:"#FFFFFF", color:"#0F172A", border:"1.5px solid #94A3B8",
          borderRadius:4, outline:"none", flexShrink:0 }} />
      <div style={{ width:44, fontSize:11, color:C.dim, textAlign:"right", flexShrink:0, paddingTop:2 }}>{unit}</div>
    </div>
  );
}

function CRow({ label, value, unit, bold, color, sub, tags, formula }) {
  const col = color||(bold?C.green:"#94A3B8");
  return (
    <div style={{ display:"flex", alignItems:"flex-start", gap:4,
      padding:"5px 10px", borderBottom:"1px solid "+C.border,
      background:bold?"#ECFDF5":"transparent" }}>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", alignItems:"center", flexWrap:"wrap", gap:2, position:"relative" }}>
          <span style={{ fontSize:13, color:bold?"#065F46":C.text, fontWeight:bold?700:400 }}>{label}</span>
          {tags && tags.map(t => <Tag key={t} t={t} />)}
          {formula && <Fx id={label+unit} text={formula} />}
        </div>
        {sub && <div style={{ fontSize:11, color:C.muted, marginTop:1 }}>{sub}</div>}
      </div>
      <div style={{ fontSize:bold?14:12, fontWeight:bold?700:500, color:col, minWidth:88, textAlign:"right", flexShrink:0 }}>{value}</div>
      <div style={{ width:44, fontSize:11, color:C.dim, textAlign:"right", flexShrink:0, paddingTop:2 }}>{unit}</div>
    </div>
  );
}

function LL({ text }) {
  return (
    <div style={{ margin:"10px 0 0", padding:"5px 12px", fontSize:11,
      fontWeight:700, color:"#FFFFFF", letterSpacing:"0.1em", textTransform:"uppercase",
      background:"#334155" }}>
      {text}
    </div>
  );
}

function CardHdr({ text }) {
  return (
    <div style={{ padding:"8px 12px", background:"#F1F5F9", fontSize:12,
      fontWeight:800, color:"#94A3B8", letterSpacing:"0.08em",
      borderBottom:"1px solid "+C.border }}>
      {text}
    </div>
  );
}

function CopyBtn({ c, inp }) {
  const [copied, setCopied] = useState(false);
  const handle = () => {
    const now = new Date().toLocaleDateString("ko-KR");
    const sig = c.cmKg < 0 ? "🔴 상한선 초과 — 비용 미회수"
      : c.cmKg < c.fixedPerKg ? "🟡 유휴 캐파 범위에서 고정비 부분 흡수 — 매입 권장"
      : "✅ 유휴 캐파 범위에서 이 딜이 고정비 부담 완화에 기여";
    const hasActual = c.actualPrice > 0;
    const text = [
      "━━━━━━━━━━━━━━━━━━━━━━━",
      "📊 Payable Rate 분석 결과",
      "━━━━━━━━━━━━━━━━━━━━━━━",
      "",
      "【 원료 조건 】",
      `분말화비율: ${inp.powderRatio}%  /  Co: ${inp.coContent}%  Ni: ${inp.niContent}%  Li: ${inp.liContent}%`,
      `환율: ${Number(inp.exchangeRate).toLocaleString("ko-KR")} ₩/$  /  Co: $${inp.coUSD}/lb  Ni: $${inp.niUSD}/ton  Li₂CO₃: $${inp.liUSD}/kg`,
      "",
      "【 Payable Rate 】",
      `Co+Ni 기준 (일반시장):   ${c.ratioCoNi.toFixed(1)}%`,
      `Co+Ni+Li 기준 (중국):    ${c.ratioCoNiLi.toFixed(1)}%`,
      `매입단가 (₩/kg 환산):    ${Math.round(c.payable).toLocaleString("ko-KR")} ₩/kg`,
      "",
      "【 공헌이익(CM) 분석 】",
      `시장 Payable Rate:       ${inp.marketRatioCoNi}%`,
      `kg당 CM:                 ${Math.round(c.cmKg).toLocaleString("ko-KR")} ₩/kg`,
      `kg당 고정비 부담:         ${Math.round(c.fixedPerKg).toLocaleString("ko-KR")} ₩/kg`,
      `이 딜 월 기여:            ${(c.cmMon/1e8).toFixed(1)}억원`,
      `고정비 커버율:            ${isNaN(c.covPct) ? "—" : c.covPct.toFixed(1)+"%"}`,
      "",
      ...(hasActual ? [
        "【 마진 분석 (실제 매입단가 기준) 】",
        `실제 매입단가:          ${Math.round(c.actualPrice).toLocaleString("ko-KR")} ₩/kg`,
        `변동비 기준 마진:        ${c.varMargin>=0?"+":""}${Math.round(c.varMargin).toLocaleString("ko-KR")} ₩/kg  (${isNaN(c.varMarginPct)?"—":(c.varMarginPct>=0?"+":"")+c.varMarginPct.toFixed(1)+"%"})`,
        `완전원가 기준 마진:      ${c.fullMargin>=0?"+":""}${Math.round(c.fullMargin).toLocaleString("ko-KR")} ₩/kg  (${isNaN(c.fullMarginPct)?"—":(c.fullMarginPct>=0?"+":"")+c.fullMarginPct.toFixed(1)+"%"})`,
        `  └ kg당 고정비 배부:   ${Math.round(c.fixedPerKg).toLocaleString("ko-KR")} ₩/kg  (월고정비 ${inp.monthlyFixedCost}억 ÷ 가동량 ${inp.monthlyVolume}ton)`,
        c.fullMargin < 0 && c.varMargin >= 0
          ? "  ※ 비용은 회수 중 · 고정비 부분 흡수 — 유휴 캐파 범위에서 매입 권장"
          : c.fullMargin >= 0 ? "  ※ 완전원가 기준으로도 흑자" : "  ※ 비용 미회수 — 매입 불가",
        "",
      ] : []),
      "【 판단 】",
      sig,
      "",
      `※ 유휴 캐파 범위 기준 판단 도구 · ${now}`,
      "━━━━━━━━━━━━━━━━━━━━━━━",
    ].join("\n");
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button onClick={handle} style={{
      margin:"8px 10px", width:"calc(100% - 20px)",
      padding:"10px 0", borderRadius:8, cursor:"pointer",
      background:copied?"#14532D":"#1E293B",
      border:"1px solid "+(copied?"#4ADE80":"#BFDBFE"),
      color:copied?"#4ADE80":"#93C5FD",
      fontSize:14, fontWeight:700, fontFamily:"Arial",
      display:"flex", alignItems:"center", justifyContent:"center", gap:6,
    }}>
      {copied ? "✅  클립보드에 복사됨" : "📋  결과 복사 (슬랙·이메일·카톡용)"}
    </button>
  );
}


class Sheet3Boundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ padding:40, textAlign:"center", color:"#B91C1C" }}>
          <div style={{ fontSize:18, fontWeight:700, marginBottom:12 }}>⚠ 3시트 렌더 오류</div>
          <div style={{ fontSize:13, color:"#475569", fontFamily:"monospace",
            background:"#F8FAFC", padding:16, borderRadius:8, textAlign:"left" }}>
            {String(this.state.error)}
          </div>
          <button onClick={() => this.setState({ hasError:false, error:null })}
            style={{ marginTop:16, padding:"8px 20px", background:"#1D4ED8",
              color:"#fff", border:"none", borderRadius:6, cursor:"pointer" }}>
            다시 시도
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

function Sheet3Tab({ inp, s }) {
  const er3  = num(inp.exchangeRate);
  const coP3 = num(inp.coUSD) * 2.20462 * er3;
  const niP3 = num(inp.niUSD) / 1000 * er3;
  const liP3 = num(inp.liUSD) * er3;
  const pr3  = num(inp.powderRatio) / 100;
  const coC3 = num(inp.coContent) / 100;
  const niC3 = num(inp.niContent) / 100;
  const liC3 = num(inp.liContent) / 100;
  const cor3 = num(inp.coRecovery) / 100;
  const nir3 = num(inp.niRecovery) / 100;
  const lir3 = num(inp.liRecovery) / 100;

  const coCont3   = coC3 * pr3 * coP3;
  const niCont3   = niC3 * pr3 * niP3;
  const liCont3   = liC3 * LI_CONV * pr3 * liP3;
  const coNiCont3 = coCont3 + niCont3;
  const totCont3  = coNiCont3 + liCont3;

  const coOut3  = coC3 * pr3 * cor3;
  const niOut3  = niC3 * pr3 * nir3;
  const liOut3  = liC3 * LI_CONV * pr3 * lir3;
  const totOut3 = coOut3*coP3 + niOut3*niP3 + liOut3*liP3;

  const wetTotal3  = coOut3*num(inp.coWetCost) + niOut3*num(inp.niWetCost) + liOut3*num(inp.liWetCost);
  const preTreat3  = num(inp.preProcessCost);
  const logistics3 = num(inp.localLogistics);
  const intl3      = num(inp.intlLogistics) * pr3;
  const krLocal3   = num(inp.krLocalLogistics) * pr3;
  const calcin3    = num(inp.calcinationCost) * pr3;
  const other3     = num(inp.otherVarCost);
  const byproduct3 = num(inp.byproductRevenue);
  const totVar3    = wetTotal3 + preTreat3 + logistics3 + intl3 + krLocal3 + calcin3 + other3 - byproduct3;
  const maxPay3    = totOut3 - totVar3;

  const tgtCoNi3 = num(inp.s3TargetCoNi);
  const pool3    = coNiCont3 * (tgtCoNi3 / 100);
  const cnliA3   = totCont3 > 0 ? Math.round(tgtCoNi3 * (coNiCont3/totCont3) * 10) / 10 : 0;
  const cmA3     = maxPay3 - pool3;

  const coPay3 = num(inp.s3CoPay) / 100;
  const liPay3 = num(inp.s3LiPay) / 100;
  const coPmt3 = coCont3 * coPay3;
  const liPmt3 = liCont3 * liPay3;
  const niPmt3 = pool3 - coPmt3 - liPmt3;
  const niPay3 = niCont3 > 0 ? niPmt3 / niCont3 * 100 : 0;
  const niNeg3 = niPmt3 < 0;
  const totPmt3 = niPmt3 + coPmt3 + liPmt3;
  const cmB3   = maxPay3 - totPmt3;

  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14 }}>

      {/* 왼쪽 */}
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
          <Sec label="① 원료 조건 — 1시트 자동 연동" color={C.blue} />
          <CRow label="Co 환산가" value={f0(coP3)} unit="₩/kg" color={C.amber}
            sub={"Co "+inp.coUSD+"$/lb × 2.20462 × "+inp.exchangeRate} />
          <CRow label="Ni 환산가" value={f0(niP3)} unit="₩/kg" color={C.blue}
            sub={"Ni "+inp.niUSD+"$/ton ÷ 1,000 × "+inp.exchangeRate} />
          <CRow label="Li₂CO₃ 환산가" value={f0(liP3)} unit="₩/kg" color={C.green}
            sub={"Li₂CO₃ "+inp.liUSD+"$/kg × "+inp.exchangeRate} />
          <CRow label="분말화비율" value={inp.powderRatio+"%"} unit=""
            sub="스크랩→BM 전환율" />

function Sheet4Tab({ inp, s }) {
  const [comps, setComps] = useState([
    { name:"", er:"1340", pct:"80" },
    { name:"", er:"1340", pct:"45" },
    { name:"", er:"1340", pct:"51" },
    { name:"", er:"1340", pct:"60" },
    { name:"", er:"1340", pct:"101" },
  ]);

  const LI_CONV = 1/0.188;

  const metalEr = num(inp.s4MetalEr);
  const coP = num(inp.coUSD) * 2.20462 * metalEr;
  const niP = num(inp.niUSD) / 1000 * metalEr;
  const liP = num(inp.liUSD) * metalEr;
  const pr  = num(inp.s4PowderRatio) / 100;
  const coC = num(inp.s4CoContent) / 100;
  const niC = num(inp.s4NiContent) / 100;
  const liC = num(inp.s4LiContent) / 100;
  const cor = num(inp.s4CoRecovery) / 100;
  const nir = num(inp.s4NiRecovery) / 100;
  const lir = num(inp.s4LiRecovery) / 100;
  const ourEr = num(inp.s4OurEr);
  const coWU = num(inp.s4CoWetUSD);
  const niWU = num(inp.s4NiWetUSD);
  const liWU = num(inp.s4LiWetUSD);

  const coOut  = coC*pr*cor; const niOut = niC*pr*nir;
  const liOut  = liC*LI_CONV*pr*lir;
  const totOut = coOut*coP + niOut*niP + liOut*liP;
  const coCont = coC*pr*coP; const niCont=niC*pr*niP;
  const liCont = liC*LI_CONV*pr*liP;
  const coNiCont = coCont+niCont; const totCont=coNiCont+liCont;

  const ourWetUSD = coOut*coWU + niOut*niWU + liOut*liWU;
  const ourWetKRW = coOut*coWU*ourEr + niOut*niWU*ourEr + liOut*liWU*ourEr;
  const ourMax    = totOut - ourWetKRW;
  const ourCoNi   = coNiCont>0 ? Math.round(ourMax/coNiCont*1000)/10 : NaN;
  const ourCnli   = totCont >0 ? Math.round(ourMax/totCont *1000)/10 : NaN;

  const fUSD = n => (n==null||isNaN(n)||!isFinite(n)) ? "—" : "$"+n.toFixed(2);
  const f1   = n => (n==null||isNaN(n)||!isFinite(n)) ? "—" : n.toFixed(1);

  const updateComp = (i,field,val) =>
    setComps(prev => prev.map((c,idx) => idx===i ? {...c,[field]:val} : c));
  const addComp    = () => setComps(prev => [...prev,{name:"",er:"1449",pct:"100"}]);
  const removeComp = i  => setComps(prev => prev.filter((_,idx)=>idx!==i));

  const secBg = "#F8FAFC";

  return (
    <div style={{ padding:14, display:"grid", gridTemplateColumns:"260px 1fr", gap:14 }}>

      {/* ── 왼쪽 입력 ── */}

        {/* 금속 시세 */}

          <Sec label="① 금속 시세 — 1시트 연동 (수정 가능)" color={C.blue} />
          <IRow label="기준 환율" value={inp.s4MetalEr} onChange={s("s4MetalEr")}
            unit="₩/$" note="메탈 시세 ₩ 환산용 · 기본값=1시트 환율" accent />
          <IRow label="Co 시세" value={inp.coUSD} onChange={s("coUSD")}
            unit="$/lb" note={"× 2.20462 × "+inp.s4MetalEr+" = "+f0(coP)+"₩/kg"} />
          <IRow label="Ni 시세" value={inp.niUSD} onChange={s("niUSD")}
            unit="$/ton" note={"÷ 1,000 × "+inp.s4MetalEr+" = "+f0(niP)+"₩/kg"} />
          <IRow label="Li₂CO₃ 시세" value={inp.liUSD} onChange={s("liUSD")}
            unit="$/kg" note={"× "+inp.s4MetalEr+" = "+f0(liP)+"₩/kg"} />
        </div>

        {/* 원료 조건 */}
        <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
          <Sec label="② 원료 조건" color={C.blue} />
          <IRow label="분말화비율" value={inp.s4PowderRatio} onChange={s("s4PowderRatio")} unit="%" />
          <IRow label="Co 함량" value={inp.s4CoContent} onChange={s("s4CoContent")} unit="%" />
          <IRow label="Ni 함량" value={inp.s4NiContent} onChange={s("s4NiContent")} unit="%" />

        </div>

        {/* 우리 가공비 USD */}

            <div style={{ padding:"6px 8px", borderRight:"1px solid "+C.border }}>
              <div style={{ fontSize:12, fontWeight:600, color:C.navy }}>{f0(ourMax)}₩</div>

                  <div style={{ fontSize:12, fontWeight:600, color:cpWetKRW<ourWetKRW?C.green:C.red }}>{f0(cpWetKRW)}₩</div>
                  <div style={{ fontSize:9, color:C.dim }}>우리比 {cpWetKRW<ourWetKRW?"↓":"↑"}{f0(Math.abs(ourWetKRW-cpWetKRW))}₩</div>
                </div>
                <div style={{ padding:"6px 8px", textAlign:"right", borderRight:"1px solid "+C.border }}>
                  <div style={{ fontSize:12, fontWeight:600, color:C.navy }}>{f0(cpMax)}₩</div>
                  <div style={{ fontSize:9, color:C.dim }}>{diff>=0?"+":""}{f1(diff)}%p</div>

                    <span style={{ fontSize:9, fontWeight:600, color:diff>0?"#DC2626":"#059669" }}>{diff>=0?"▲+":"▼"}{Math.abs(diff).toFixed(1)}</span>
                  </div>
                  <div style={{ display:"flex", alignItems:"baseline", gap:3 }}>
                    <span style={{ fontSize:13, fontWeight:700, color:(cpCnli-ourCnli)>0?"#1D4ED8":"#059669" }}>{fp(cpCnli)}</span>
                    <span style={{ fontSize:9, color:C.dim }}>CoNiLi</span>
                  </div>
                </div>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <button onClick={()=>removeComp(i)} style={{ background:"none", border:"none", color:"#94A3B8", cursor:"pointer", fontSize:14, padding:4 }}>✕</button>
                </div>
              </div>
            );
          })}
        </div>

        {/* 시사점 */}
        <div style={{ background:C.card, borderRadius:10, border:"1px solid "+C.border, overflow:"hidden" }}>
          <Sec label="⑥ 경쟁 포지셔닝 요약" color={C.navy} />
          <div style={{ padding:"12px 14px", display:"flex", flexWrap:"wrap", gap:10 }}>
            {comps.map((comp,i) => {
              const pctN   = num(comp.pct)/100; const er=num(comp.er);
              const cpWet  = coOut*coWU*pctN*er+niOut*niWU*pctN*er+liOut*liWU*pctN*er;
              const cpCoNi = coNiCont>0?Math.round((totOut-cpWet)/coNiCont*1000)/10:NaN;
              const diff   = cpCoNi-ourCoNi;
              return (
                <div key={i} style={{ padding:"10px 14px", borderRadius:8, minWidth:140,
                  background:diff>5?"#FEF2F2":diff<-5?"#F0FDF4":"#FFFBEB",
                  border:"1px solid "+(diff>5?"#FECACA":diff<-5?"#A7F3D0":"#FDE68A") }}>
                  <div style={{ fontSize:11, fontWeight:700, color:C.navy, marginBottom:4 }}>
                    {comp.name||`경쟁사 ${i+1}`}
                  </div>
                  <div style={{ fontSize:20, fontWeight:800,
                    color:diff>5?C.red:diff<-5?C.green:C.amber }}>{fp(cpCoNi)}</div>
                  <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>CoNi (우리: {fp(ourCoNi)})</div>
                  <div style={{ fontSize:10, marginTop:4, fontWeight:600,
                    color:diff>5?C.red:diff<-5?C.green:C.amber }}>
                    {diff>5?"⚠ 경쟁력 높음":diff<-5?"✅ 우리가 우위":"≈ 유사 수준"}
                  </div>
                  <div style={{ fontSize:9, color:C.dim, marginTop:2 }}>우리比 {comp.pct}% · 환율 {f0(er)}₩</div>

        {/* 주석 */}

            borderBottom:"1px solid "+C.border, paddingBottom:6 }}>
            전체 계산 로직 및 수식
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>

            {/* 행1 좌: ① 금속시세 */}
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:C.blue, marginBottom:6 }}>
                ① 금속시세 → ₩ 환산
              </div>
              <div style={{ fontSize:10, color:C.muted, lineHeight:1.9 }}>
                Co 환산가 = Co($/lb) × 2.20462 × <b style={{color:C.blue}}>기준환율</b><br/>
                Ni 환산가 = Ni($/ton) ÷ 1,000 × <b style={{color:C.blue}}>기준환율</b><br/>
                Li₂CO₃ 환산가 = Li₂CO₃($/kg) × <b style={{color:C.blue}}>기준환율</b><br/>
                <span style={{color:C.dim}}>※ 기준환율은 4시트 독립 입력 · Co/Ni/Li 시세는 1시트 연동</span>
              </div>
            </div>

            {/* 행1 우: ③ 우리 가공비 */}
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:C.purple, marginBottom:6 }}>
                ③ 우리 가공비 → ₩ 환산
              </div>
              <div style={{ fontSize:10, color:C.muted, lineHeight:1.9 }}>
                우리 ₩가공비 = Co회수량 × Co가공비($/kg) × <b style={{color:C.purple}}>우리환율</b><br/>
                　　　　　　 + Ni회수량 × Ni가공비($/kg) × <b style={{color:C.purple}}>우리환율</b><br/>
                　　　　　　 + Li회수량 × Li가공비($/kg) × <b style={{color:C.purple}}>우리환율</b><br/>
                <span style={{color:C.dim}}>※ 우리환율 = 제출 당시 환율 (시점 차이 반영)</span>
              </div>
            </div>

            {/* 행2 좌: ②③④ 원료조건 → Output/함량가치 */}
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:C.green, marginBottom:6 }}>
                ②③④ 원료 조건 → Output 가치 / 함량가치
              </div>
              <div style={{ fontSize:10, color:C.muted, lineHeight:1.9 }}>
                <b style={{color:C.green}}>② 원료 조건 입력</b>: 분말화비율, Co/Ni/Li 함량%, 회수율%<br/>
                Co 회수량(g/kg) = Co함량% × 분말화% × Co회수율%<br/>
                Ni 회수량, Li 회수량도 동일 방식<br/>
                <br/>
                Output합계 = Co회수량×Co환산가 + Ni회수량×Ni환산가 + Li회수량×Li환산가<br/>
                Co+Ni 함량가치 = Co함량%×분말화%×Co환산가 + Ni함량%×분말화%×Ni환산가<br/>
                전체 함량가치 = Co+Ni 함량가치 + Li₂CO₃ 함량가치<br/>
                <span style={{color:C.dim}}>※ 함량가치 = 회수율 미적용 · Payable Rate 분모</span>
              </div>
            </div>

            {/* 행2 우: ⑤ 경쟁사 역산 */}
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:C.amber, marginBottom:6 }}>
                ⑤ 경쟁사 Payable Rate 역산
              </div>
              <div style={{ fontSize:10, color:C.muted, lineHeight:1.9 }}>
                경쟁사 USD가공비 = 우리 USD가공비 × 우리比%<br/>
                경쟁사 ₩가공비 = 경쟁사 USD가공비 × <b style={{color:C.amber}}>경쟁사 환율</b><br/>
                경쟁사 최대매입단가 = Output합계 − 경쟁사 ₩가공비<br/>
                CoNi Rate = 최대매입단가 ÷ Co+Ni 함량가치 × 100<br/>
                CoNiLi Rate = 최대매입단가 ÷ 전체 함량가치 × 100<br/>
                <span style={{color:"#DC2626"}}>※ 물류·기타비용은 동일하다고 가정</span>
              </div>
            </div>

          </div>
          <div style={{ marginTop:10, padding:"8px 12px", background:"#EFF6FF",
            borderRadius:6, fontSize:10, color:"#1D4ED8" }}>
            💡 환율 차이의 영향: 경쟁사가 더 낮은 환율 시점에 제출했다면
            같은 USD 가공비라도 ₩ 환산가가 낮아져 Payable Rate가 높게 나옴
            → <b>우리比%와 환율을 함께 조정해서 실질 경쟁력을 비교</b>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab]   = useState(0);

  const [tgt, setTgt]   = useState("90");
  const [fxId, setFxId] = useState(null);
  const [chShow, setChShow] = useState(false);
  const [inp, setInp]   = useState({
    exchangeRate:"1449.32",
    coUSD:"25.52", niUSD:"17133", liUSD:"18.72",
    powderRatio:"100",
    coContent:"2.57", niContent:"29.39", liContent:"4.16",
    coRecovery:"95", niRecovery:"95", liRecovery:"90",
    coWetCost:"13300", niWetCost:"11700", liWetCost:"9450",
    preProcessCost:"0", localLogistics:"22",
    intlLogistics:"0", krLocalLogistics:"0",
    calcinationCost:"0", otherVarCost:"0",
    byproductRevenue:"0",
    actualPrice:"0",
    marketRatioCoNi:"88", monthlyVolume:"1350", monthlyFixedCost:"58",
    niSO4Price:"0", coSO4Price:"0", liCO3Price:"0",
    niChPay:"0", coChPay:"0", liChPay:"0",
    chNiContent:"", chCoContent:"", chLiContent:"",
    s3PreTreat:"0", s3Logistics:"0",
    s3TargetCoNi:"88", s3CoPay:"15", s3LiPay:"20",
    // ── 4시트 ──
    s4MetalEr:"1449.32",          // 1시트 exchangeRate 기본값 연동
    s4OurEr:"1340",
    s4PowderRatio:"100",
    s4CoContent:"3.0", s4NiContent:"25.0", s4LiContent:"3.384",
    s4CoRecovery:"95", s4NiRecovery:"95", s4LiRecovery:"90",
    s4CoWetUSD:"8.96", s4NiWetUSD:"7.31", s4LiWetUSD:"6.87",
    // 금속시세는 1시트 coUSD/niUSD/liUSD 공유
  });

  const s = k => v => setInp(p => ({ ...p, [k]: v }));
  const c = compute(inp);
  const tgtNum      = num(tgt);
  const tgtPayable  = c.coNiContained * (tgtNum / 100);
  const allowedWet  = c.totOut - tgtPayable
    - num(inp.preProcessCost) - num(inp.localLogistics)
    - num(inp.intlLogistics)*c.pr - num(inp.krLocalLogistics)*c.pr
    - num(inp.calcinationCost)*c.pr - num(inp.otherVarCost);
  const tgtCoNiLi   = (c.coNiContained > 0 && c.totContained > 0)
    ? Math.round(tgtNum * (c.coNiContained / c.totContained) * 100) / 100 : NaN;
  const cmOk        = c.cmKg >= 0;
  const cmCol       = cmOk ? C.green : C.red;
  const sig         = c.cmKg < 0 ? "red" : c.cmKg < c.fixedPerKg ? "amber" : "green";
  const sigCol      = sig==="green" ? C.green : sig==="amber" ? C.amber : C.red;
  const mCol        = c.fullMargin >= 0 ? C.green : c.varMargin >= 0 ? C.amber : C.red;

  return (
    <FxCtx.Provider value={{ openId:fxId, setOpenId:setFxId }}>
      <div onClick={() => setFxId(null)}
        style={{ fontFamily:"'Apple SD Gothic Neo',Arial,sans-serif",
          background:C.bg, minHeight:"100vh", color:C.text }}>

        <div style={{ padding:"14px 20px", background:C.headerBg, borderBottom:"1px solid #334155" }}>
          <div style={{ fontSize:11, letterSpacing:"0.15em", color:"#94A3B8", textTransform:"uppercase" }}>원료 매입 단가 분석</div>
          <div style={{ fontSize:20, fontWeight:800, marginTop:2, color:C.headerText }}>CM 기반 Payable Rate 계산기</div>
          <div style={{ fontSize:12, color:"#94A3B8", marginTop:4 }}>
            비용만 차감 · Payable Rate = 비용 기준 최대 허용 지급률(상한선) · 유휴 캐파 범위 판단 도구
          </div>
        </div>

        <div style={{ display:"flex", background:"#FFFFFF", borderBottom:"2px solid "+C.border }}>
          {["1시트  Payable Rate 계산","2시트  목표 가공비 역산","3시트  스크랩 Payable","4시트  경쟁사 분석"].map((t,i) => (
            <button key={i} onClick={() => setTab(i)}
              style={{ padding:"11px 20px", fontSize:13, fontWeight:600, cursor:"pointer", 
                border:"none", background:"transparent",
                color:tab===i?C.amber:C.muted, fontWeight:tab===i?700:500,
                borderBottom:tab===i?"2px solid "+C.amber:"2px solid transparent" }}>
              {t}
            </button>
          ))}
        </div>

        <div style={{ maxWidth:980, margin:"0 auto", padding:14 }}>

          {tab === 0 && (
            <div>

              {/* ── 행1: 입력 | 결과 | Payable·CM ── */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14 }}>

                {/* 왼쪽: 입력 */}
                <div style={{ background:C.card, borderRadius:10, overflow:"hidden", border:"1px solid "+C.border }}>
                  <Sec label="① 환율" />
                  <IRow label="환율" value={inp.exchangeRate} onChange={s("exchangeRate")} unit="₩/$" />

                  <Sec label="② 금속 시세" color={C.blue} />
                  <IRow label="Co 시세" value={inp.coUSD} onChange={s("coUSD")} unit="$/lb" />
                  <CRow label="Co 환산가" value={f0(c.coP)} unit="₩/kg" color={C.blue}
                    formula={"Co $/lb × 2.20462 × 환율\n= "+inp.coUSD+" $/lb × 2.20462 × "+inp.exchangeRate+" ₩/$"} />
                  <IRow label="Ni 시세" value={inp.niUSD} onChange={s("niUSD")} unit="$/ton" />
                  <CRow label="Ni 환산가" value={f0(c.niP)} unit="₩/kg" color={C.blue}
                    formula={"Ni $/ton ÷ 1,000 × 환율\n= "+inp.niUSD+" ÷ 1000 × "+inp.exchangeRate} />
                  <IRow label="Li₂CO₃ 시세" value={inp.liUSD} onChange={s("liUSD")} unit="$/kg" />
                  <CRow label="Li₂CO₃ 환산가" value={f0(c.liP)} unit="₩/kg" color={C.blue}
                    formula={"Li₂CO₃ 시세 × 환율\n= "+inp.liUSD+" $/kg × "+inp.exchangeRate+" ₩/$\n※ Li함량은 Li 금속 기준 입력 → ÷18.8% 자동 환산"} />

                  <Sec label="③ 원료 분석" color={C.blue} />
                  <IRow label="분말화비율" value={inp.powderRatio} onChange={s("powderRatio")} unit="%"
                    note="BM=100% · 양극스크랩≈80% · 젤리롤≈75% · 셀≈60%"
                    formula={"스크랩 종류별 BM 전환율\n= BM(kg) ÷ 스크랩(kg) × 100"} />
                  <IRow label="Co 함량" value={inp.coContent} onChange={s("coContent")} unit="%" />
                  <IRow label="Ni 함량" value={inp.niContent} onChange={s("niContent")} unit="%" />
                  <IRow label="Li 함량" value={inp.liContent} onChange={s("liContent")} unit="%"
                    note="Li 금속 기준 입력 (Li₂CO₃ 환산: ÷ 18.8% 자동 적용)" />

                  <Sec label="④ 습식 회수율" color={C.blue} />
                  <IRow label="Co 회수율" value={inp.coRecovery} onChange={s("coRecovery")} unit="%"
                    formula={"Co 회수율: 습식공정에서 실제 회수되는 비율\n= 회수된 Co(kg) ÷ 투입 Co(kg) × 100\n현재 입력값: "+inp.coRecovery+"%"} />
                  <IRow label="Ni 회수율" value={inp.niRecovery} onChange={s("niRecovery")} unit="%"
                    formula={"Ni 회수율: 습식공정에서 실제 회수되는 비율\n= 회수된 Ni(kg) ÷ 투입 Ni(kg) × 100\n현재 입력값: "+inp.niRecovery+"%"} />
                  <IRow label="Li₂CO₃ 회수율" value={inp.liRecovery} onChange={s("liRecovery")} unit="%"
                    formula={"Li₂CO₃ 회수율: 습식공정에서 실제 회수되는 비율\n= 회수된 Li₂CO₃(kg) ÷ 투입 Li₂CO₃(kg) × 100\n현재 입력값: "+inp.liRecovery+"%"} />

                  <Sec label="⑤ 습식가공비" color={C.purple} />
                  <div style={{ padding:"3px 10px", fontSize:11, color:"#7C3AED" }}>₩/kg-제품 기준 · 고정비(감가·고정인건비) 제외</div>
                  <IRow label="Co 습식가공비" value={inp.coWetCost} onChange={s("coWetCost")} unit="₩/kg" accent />
                  <IRow label="Ni 습식가공비" value={inp.niWetCost} onChange={s("niWetCost")} unit="₩/kg" accent />
                  <IRow label="Li₂CO₃ 습식가공비" value={inp.liWetCost} onChange={s("liWetCost")} unit="₩/kg" accent />
                  <CRow label="총 습식가공비 (원료 kg당)" value={f0(c.wetTotal)} unit="₩/kg" color={C.purple} bold
                    formula={"총 습식가공비 = Co_out×Co가공비 + Ni_out×Ni가공비 + Li_out×Li가공비\n"+"Co:  "+(c.coOut*1000).toFixed(2)+"g/kg × "+inp.coWetCost+"₩/kg = "+f0(c.coOut*num(inp.coWetCost))+"₩\n"+"Ni:  "+(c.niOut*1000).toFixed(2)+"g/kg × "+inp.niWetCost+"₩/kg = "+f0(c.niOut*num(inp.niWetCost))+"₩\n"+"Li:  "+(c.liOut*1000).toFixed(2)+"g/kg × "+inp.liWetCost+"₩/kg = "+f0(c.liOut*num(inp.liWetCost))+"₩\n"+"합계: "+f0(c.wetTotal)+"₩/kg"} />

                  <Sec label="⑥ 물류 · 소성 · 기타 비용" color={C.red} />
                  <IRow label="전처리 가공비" value={inp.preProcessCost} onChange={s("preProcessCost")} unit="₩/kg" note="₩/kg-스크랩 기준 · BM 직매입=0" accent />
                  <IRow label="로컬 물류비" value={inp.localLogistics} onChange={s("localLogistics")} unit="₩/kg" note="₩/kg-입력원료 기준"
                    formula="입력원료 1kg당 운임, 그대로 적용" />
                  <IRow label="국제 운임 (CIF 부산)" value={inp.intlLogistics} onChange={s("intlLogistics")} unit="₩/kg-BM" note="₩/kg-BM · 해외→부산 · 불필요시 0"
                    formula={"예) $5,000 ÷ 20,000kg = $0.25/kg-BM\n자동환산: ×분말화비율"} />
                  <IRow label="한국 로컬 (부산→군산)" value={inp.krLocalLogistics} onChange={s("krLocalLogistics")} unit="₩/kg-BM" note="₩/kg-BM · 불필요시 0"
                    formula="자동환산: ×분말화비율" />
                  <IRow label="소성비용 (군산)" value={inp.calcinationCost} onChange={s("calcinationCost")} unit="₩/kg-BM" note="₩/kg-BM · BM 전용 · 불필요시 0"
                    formula="자동환산: ×분말화비율" />
                  <IRow label="기타 비용" value={inp.otherVarCost} onChange={s("otherVarCost")} unit="₩/kg" />
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                <div style={{ background:C.card, borderRadius:10, overflow:"hidden", border:"1px solid "+C.border }}>
                  <Sec label="⑦ 부산물 판매수익" color={C.green} />
                  <IRow label="부산물 판매수익" value={inp.byproductRevenue} onChange={s("byproductRevenue")}
                    unit="₩/kg-스크랩" accent
                    note="스크랩 kg당 부산물(동·알루미늄 등) 판매수익 · 분말화비율 미적용 · Payable 상한선 증가" />
                </div>

                {/* 오른쪽: 결과 */}
                <div style={{ background:C.card, borderRadius:10, overflow:"hidden", border:"1px solid "+C.border }}>
                  {/* ── 회수 전: 함량가치 (Contained Value) ── */}
                  <Sec label="원재료 내 함량가치 — Payable Rate 분모 (회수율 미적용)" color="#60A5FA" />
                  <CRow label="Co 함량가치" value={f0(c.coContained)} unit="₩/kg"
                    color="#93C5FD"
                    sub={"Co 함량 "+inp.coContent+"% × 분말화 "+inp.powderRatio+"% — 회수율 미적용, 시장 Payable 기준"}
                    formula={"Co 환산가 = Co $/lb × 2.20462 × 환율\nCo 함량가치 = Co함량 × 분말화 × Co환산가 (회수율 미적용)\n= "+inp.coContent+"% × "+inp.powderRatio+"% × "+f0(c.coP)+" ₩/kg"} />
                  <CRow label="Ni 함량가치" value={f0(c.niContained)} unit="₩/kg"
                    color="#93C5FD"
                    sub={"Ni 함량 "+inp.niContent+"% × 분말화 "+inp.powderRatio+"% — 회수율 미적용, 시장 Payable 기준"}
                    formula={"Ni함량×분말화×Ni환산가 (회수율 미적용)\n= "+inp.niContent+"% × "+inp.powderRatio+"% × "+f0(c.niP)} />
                  <CRow label="Li₂CO₃ 함량가치" value={f0(c.liContained)} unit="₩/kg"
                    color="#93C5FD"
                    sub={"Li 함량 "+inp.liContent+"% ÷ 18.8%→Li₂CO₃ × 분말화 — 회수율 미적용, 시장 Payable 기준"}
                    formula={"Li₂CO₃ = Li함량 ÷ 18.8%\n→ Li₂CO₃함량가치 = Li₂CO₃ × 분말화 × Li₂CO₃환산가 (회수율 미적용)"} />
                  <CRow label="Co+Ni 함량가치" value={f0(c.coNiContained)} unit="₩/kg" bold
                    color="#60A5FA"
                    sub="Payable Rate 분모 — Co+Ni 기준 (일반시장·국내·유럽·미국)"
                    formula="Co함량가치 + Ni함량가치" />
                  <CRow label="전체 함량가치" value={f0(c.totContained)} unit="₩/kg"
                    color="#60A5FA"
                    sub="Payable Rate 분모 — Co+Ni+Li 기준 (중국)"
                    formula="Co함량가치 + Ni함량가치 + Li함량가치\n※ Li: 입력 Li함량(%) ÷ 18.8% → Li₂CO₃ 환산 후 시세 적용" />

                  {/* ── 회수 후: 실제 Output 가치 ── */}
                  <Sec label="회수 후 실제 Output 가치 — 비용 계산 기준" color={C.green} />
                  <CRow label="Co 가치" value={f0(c.coVal)} unit="₩/kg"
                    sub={"Co 회수량 "+(c.coOut*1000).toFixed(1)+" g/kg-원료 (회수율 "+inp.coRecovery+"%)"}
                    formula={"Co 환산가 = Co $/lb × 2.20462 × 환율\nCo가치 = Co함량 × 분말화 × Co회수율 × Co환산가\n= "+inp.coContent+"% × "+inp.powderRatio+"% × "+inp.coRecovery+"% × "+f0(c.coP)+" ₩/kg"} />
                  <CRow label="Ni 가치" value={f0(c.niVal)} unit="₩/kg"
                    sub={"Ni 회수량 "+(c.niOut*1000).toFixed(1)+" g/kg-원료 (회수율 "+inp.niRecovery+"%)"}
                    formula={"Ni함량×분말화×Ni회수율×Ni환산가\n= "+inp.niContent+"% × "+inp.powderRatio+"% × "+inp.niRecovery+"% × "+f0(c.niP)} />
                  <CRow label="Li₂CO₃ 가치" value={f0(c.liVal)} unit="₩/kg"
                    sub={"Li₂CO₃ 회수량 "+(c.liOut*1000).toFixed(1)+" g/kg-원료 (회수율 "+inp.liRecovery+"%)"}
                    formula={"Li₂CO₃ = Li함량 ÷ 18.8%\n→ Li₂CO₃가치 = Li₂CO₃ × 분말화 × Li회수율 × Li₂CO₃환산가\n= "+inp.liContent+"% ÷ 18.8% × "+inp.powderRatio+"% × "+inp.liRecovery+"% × "+f0(c.liP)} />
                  <CRow label="Output 합계 (회수 후)" value={f0(c.totOut)} unit="₩/kg" bold formula="Co+Ni+Li₂CO₃ 회수가치 합계" />

                  <Sec label="비용 합계" color={C.red} />
                  <CRow label="전처리 가공비" value={"-"+f0(c.preV)} unit="₩/kg" color="#DC2626" />
                  <CRow label="습식가공비" value={"-"+f0(c.wetTotal)} unit="₩/kg" color="#DC2626" />
                  <CRow label="로컬 물류비" value={"-"+f0(c.localV)} unit="₩/kg" color="#DC2626" />
                  <CRow label="국제 운임" value={"-"+f0(c.intlV*c.pr)} unit="₩/kg" color="#DC2626"
                    formula={"국제운임 × 분말화비율\n= "+f0(c.intlV)+" × "+(c.pr*100).toFixed(0)+"% = "+f0(c.intlV*c.pr)} />
                  <CRow label="한국 로컬" value={"-"+f0(c.krV*c.pr)} unit="₩/kg" color="#DC2626"
                    formula={"한국로컬 × 분말화비율\n= "+f0(c.krV)+" × "+(c.pr*100).toFixed(0)+"% = "+f0(c.krV*c.pr)} />
                  <CRow label="소성비용" value={"-"+f0(c.calcV*c.pr)} unit="₩/kg" color="#DC2626"
                    formula={"소성비 × 분말화비율\n= "+f0(c.calcV)+" × "+(c.pr*100).toFixed(0)+"% = "+f0(c.calcV*c.pr)} />
                  <CRow label="기타 비용" value={"-"+f0(c.otherV)} unit="₩/kg" color="#DC2626" />
                  <CRow label="부산물 판매수익" value={"+"+f0(c.byproduct)} unit="₩/kg" color={C.green}
                    sub="Payable 상한선 증가" />
                  <CRow label="비용 합계 (부산물 차감 후)" value={"-"+f0(c.totVar)} unit="₩/kg" bold color={C.red}
                    formula="전처리+습식+로컬+국제+한국로컬+소성+기타" />
                </div>
                </div>

                {/* Payable Rate + CM분석 */}
                <div style={{ background:C.card, borderRadius:10, overflow:"hidden", border:"1px solid "+C.border }}>
                  <Sec label="Payable Rate — 원재료 내 함량가치 대비 최대 허용 지급률 (상한선)" color={C.amber} />
                  <div style={{ margin:"6px 10px", padding:"12px 14px",
                    background:"#FFFBEB", border:"1px solid #D97706", borderRadius:8 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                      <div>
                        <div style={{ fontSize:13, fontWeight:700, color:C.amber }}>Co+Ni 기준 Payable Rate</div>
                        <div style={{ fontSize:11, color:C.dim }}>일반 시장 (국내·유럽·미국)</div>
                        <div style={{ fontSize:11, color:"#64748B" }}>= 최대매입단가 ÷ Co+Ni 함량가치 (회수율 미적용 기준)</div>
                      </div>
                      <span style={{ fontSize:32, fontWeight:800, color:C.amber }}>{fp(c.ratioCoNi, 1)}</span>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                      padding:"8px 0", borderTop:"1px solid #E2E8F0", marginBottom:8 }}>
                      <div>
                        <div style={{ fontSize:13, fontWeight:700, color:"#93C5FD" }}>Co+Ni+Li 기준 Payable Rate</div>
                        <div style={{ fontSize:11, color:C.dim }}>중국 기준</div>
                        <div style={{ fontSize:11, color:"#94A3B8" }}>= 최대매입단가 ÷ Co+Ni+Li 함량가치</div>
                      </div>
                      <span style={{ fontSize:32, fontWeight:800, color:"#93C5FD" }}>{fp(c.ratioCoNiLi, 1)}</span>
                    </div>
                    <div style={{ padding:"7px 10px", background:"#F8FAFC", borderRadius:6,
                      display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div>
                        <div style={{ fontSize:11, fontWeight:600, color:"#475569" }}>매입단가 (₩/kg 환산)</div>
                        <div style={{ fontSize:10, color:"#64748B" }}>= 회수Output - 비용합계</div>
                      </div>
                      <span style={{ fontSize:17, fontWeight:700, color:C.amber }}>{f0(c.payable)} ₩/kg</span>
                    </div>
                  </div>

                  <Sec label="공헌이익(CM) 분석 — 이 딜의 고정비 기여도" color={C.purple} />
                  <LL text="① 이 딜 — 시장 Payable Rate 비교" />
                  <IRow label="시장 Payable Rate (Co+Ni 기준)" value={inp.marketRatioCoNi}
                    onChange={s("marketRatioCoNi")} unit="%" highlight
                    note="상대방 제시 Payable Rate 입력 — 우리 상한선과 비교"
                    formula="시장 매입단가 = Co+Ni가치 × 시장 Payable Rate%" />
                  <CRow label="시장 매입단가 (역산)" value={f0(c.marketPrice)} unit="₩/kg" color="#C4B5FD"
                    sub={"= Co+Ni 함량가치 "+f0(c.coNiContained)+"₩ × 시장Rate "+inp.marketRatioCoNi+"%"}
                    formula={"Co+Ni 함량가치 × 시장 Rate\n= "+f0(c.coNiContained)+" × "+inp.marketRatioCoNi+"% = "+f0(c.marketPrice)} />

                  <div style={{ margin:"4px 10px 0", padding:"10px 12px",
                    background:"#EFF6FF", border:"1px solid #1E293B", borderRadius:8 }}>
                    {[
                      { label:"우리 최대 Rate (CM=0)", val:c.ratioCoNi||0, color:C.amber, fill:C.amber, lc:"#92400E" },
                      { label:"시장 Payable Rate", val:num(inp.marketRatioCoNi), color:"#A78BFA", fill:"#7C3AED", lc:"#7C3AED" },
                    ].map((row,i) => {
                      const maxR = Math.max(c.ratioCoNi||0, num(inp.marketRatioCoNi), 100);
                      return (
                        <div key={i} style={{ marginBottom:i===0?6:8 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                            <span style={{ fontSize:12, color:row.lc }}>{row.label}</span>
                            <span style={{ fontSize:15, fontWeight:800, color:row.color }}>{fp(row.val)}</span>
                          </div>
                          <div style={{ height:10, background:"#E2E8F0", borderRadius:3, overflow:"hidden" }}>
                            <div style={{ height:"100%", background:row.fill, borderRadius:3, transition:"width 0.5s",
                              width:Math.min(row.val/maxR*100,100)+"%" }} />
                          </div>
                        </div>
                      );
                    })}
                    {(() => {
                      const gap = (c.ratioCoNi||0) - num(inp.marketRatioCoNi);
                      return (
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                          padding:"6px 8px", borderRadius:5,

                    ].map(m => {
                      const goal = m.cur * ratio;
                      const pct  = m.cur > 0 ? ((goal-m.cur)/m.cur)*100 : 0;
                      return (
                        <div key={m.name} style={{ display:"grid",
                          gridTemplateColumns:"2fr 2fr 2fr 1.5fr", gap:2,
                          padding:"5px 4px", borderBottom:"1px solid "+C.border, alignItems:"center" }}>
                          <div style={{ fontSize:13, fontWeight:600, color:m.color }}>{m.name}</div>
                          <div style={{ fontSize:13, color:"#94A3B8", textAlign:"right" }}>{f0(m.cur)}</div>
                          <div style={{ fontSize:14, fontWeight:700, textAlign:"right",
                            color:allowedWet>=0?C.purple:C.red }}>
                            {allowedWet>=0?f0(goal):"—"}
                          </div>
                          <div style={{ textAlign:"right" }}>
                            {allowedWet>=0 && (
                              <span style={{ fontSize:12, fontWeight:700, color:pct>=0?C.green:C.red }}>
                                {pct>=0?"+":""}{pct.toFixed(1)}%
                              </span>
                            )}
                          </div>
                        </div>
                      );
                    });
                  })()}
                  <div style={{ display:"grid", gridTemplateColumns:"2fr 2fr 2fr 1.5fr", gap:2,
                    padding:"6px 4px", background:"#ECFDF5", borderRadius:"0 0 6px 6px", marginTop:2 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#059669" }}>합  계</div>
                    <div style={{ fontSize:13, fontWeight:700, color:"#94A3B8", textAlign:"right" }}>{f0(c.wetTotal)}</div>
                    <div style={{ fontSize:15, fontWeight:800, textAlign:"right",
                      color:allowedWet>=0?C.purple:C.red }}>{f0(allowedWet)}</div>
                    <div style={{ textAlign:"right" }}>
                      <span style={{ fontSize:12, fontWeight:700,
                        color:allowedWet>=c.wetTotal?C.green:C.red }}>
                        {allowedWet>=c.wetTotal?"✅ 가능":"⚠ 절감"}
                      </span>
                    </div>
                  </div>
                </div>

                <Sec label="⑥ Payable Rate 요약" color={C.amber} />
                <div style={{ margin:"6px 10px 10px", padding:"12px 14px",
                  background:"#FFFBEB", border:"1px solid #D97706", borderRadius:8 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                    paddingBottom:10, borderBottom:"1px solid #E2E8F0", marginBottom:10 }}>
                    <div>
                      <div style={{ fontSize:13, fontWeight:600, color:C.amber }}>Co+Ni 기준</div>
                      <div style={{ fontSize:11, color:C.muted }}>목표매입단가 ÷ Co+Ni 함량가치 (contained value)</div>
                    </div>
                    <span style={{ fontSize:30, fontWeight:800, color:C.amber }}>{fp(tgtNum, 1)}</span>
                  </div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div>
                      <div style={{ fontSize:13, fontWeight:600, color:"#1D4ED8" }}>Co+Ni+Li 기준 (중국)</div>
                      <div style={{ fontSize:11, color:C.muted }}>목표매입단가 ÷ 전체 함량가치 (contained value)</div>
                    </div>
                    <span style={{ fontSize:30, fontWeight:800, color:"#1D4ED8" }}>{fp(tgtCoNiLi, 1)}</span>
                  </div>
                </div>
              </div>
            </div>

          {/* ── 중국 지불률 환산 (독립 섹션) ── */}
          <div style={{ marginTop:14, background:C.card, borderRadius:10,
            border:"1px solid "+C.border, overflow:"hidden" }}>

            {/* 헤더 + 토글 */}
            <div onClick={() => setChShow(v => !v)}
              style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
                padding:"10px 16px", cursor:"pointer",
                background:"#EFF6FF", borderBottom: chShow ? "1px solid "+C.border : "none" }}>
              <div>
                <span style={{ fontSize:13, fontWeight:700, color:C.blue }}>
                  중국 지불률 → 우리 기준 CoNiLi Rate 환산
                </span>
                <span style={{ fontSize:11, color:C.muted, marginLeft:8 }}>
                  NiSO₄·CoSO₄·Li₂CO₃ 시세 × 지불률 → 우리 기준으로 환산
                </span>
              </div>
              <span style={{ fontSize:16, color:C.blue, fontWeight:700 }}>
                {chShow ? "▲ 접기" : "▼ 펼치기"}
              </span>
            </div>

            {chShow && (
              <div>
                <div style={{ padding:"6px 12px 4px", fontSize:11, color:C.muted,
                  background:"#F8FAFC", borderBottom:"1px solid "+C.border }}>
                  중국 시세는 증치세 제외(VAT-ex) 기준 입력 · NiSO₄·CoSO₄ 단위: $/mt
                </div>

                {/* NiSO4 */}
                <div style={{ borderBottom:"1px solid "+C.border }}>
                  <div style={{ display:"flex", alignItems:"center", padding:"6px 10px",
                    background:"#F8FAFC", gap:6 }}>
                    <span style={{ fontSize:13, color:C.text, fontWeight:500, flex:1 }}>
                      황산니켈 (NiSO₄)
                    </span>
                    <span style={{ fontSize:11, color:C.muted }}>Ni 함량 22% · 증치세 제외(VAT-ex)</span>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:0 }}>
                    <IRow label="NiSO₄ 시세" value={inp.niSO4Price} onChange={s("niSO4Price")} unit="$/mt" />
                    <IRow label="Ni 원재료 함량" value={inp.chNiContent || inp.niContent} onChange={s("chNiContent")} unit="%"
                      note={"1시트 기본: "+inp.niContent+"%"} highlight />
                    <IRow label="Ni 지불률" value={inp.niChPay} onChange={s("niChPay")} unit="%" />
                  </div>
                </div>

                {/* CoSO4 */}
                <div style={{ borderBottom:"1px solid "+C.border }}>
                  <div style={{ display:"flex", alignItems:"center", padding:"6px 10px",
                    background:"#F8FAFC", gap:6 }}>
                    <span style={{ fontSize:13, color:C.text, fontWeight:500, flex:1 }}>
                      황산코발트 (CoSO₄)
                    </span>
                    <span style={{ fontSize:11, color:C.muted }}>Co 함량 20.5% · 증치세 제외(VAT-ex)</span>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:0 }}>
                    <IRow label="CoSO₄ 시세" value={inp.coSO4Price} onChange={s("coSO4Price")} unit="$/mt" />
                    <IRow label="Co 원재료 함량" value={inp.chCoContent || inp.coContent} onChange={s("chCoContent")} unit="%"
                      note={"1시트 기본: "+inp.coContent+"%"} highlight />
                    <IRow label="Co 지불률" value={inp.coChPay} onChange={s("coChPay")} unit="%" />
                  </div>
                </div>

                {/* Li2CO3 */}
                <div style={{ borderBottom:"1px solid "+C.border }}>
                  <div style={{ display:"flex", alignItems:"center", padding:"6px 10px",
                    background:"#F8FAFC", gap:6 }}>
                    <span style={{ fontSize:13, color:C.text, fontWeight:500, flex:1 }}>
                      탄산리튬 (Li₂CO₃)
                    </span>
                    <span style={{ fontSize:11, color:C.muted }}>Li 함량 ÷18.8% → Li₂CO₃ 환산 · 증치세 제외(VAT-ex)</span>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:0 }}>
                    <IRow label="Li₂CO₃ 시세" value={inp.liCO3Price} onChange={s("liCO3Price")} unit="$/mt" />
                    <IRow label="Li 원재료 함량" value={inp.chLiContent || inp.liContent} onChange={s("chLiContent")} unit="%"
                      note={"1시트 기본: "+inp.liContent+"%"} highlight />
                    <IRow label="Li 지불률" value={inp.liChPay} onChange={s("liChPay")} unit="%" />
                  </div>
                </div>

                {/* 환산 결과 */}
                {(() => {
                  const er2    = num(inp.exchangeRate);
                  const niSO4P = num(inp.niSO4Price) / 1000 * er2;
                  const coSO4P = num(inp.coSO4Price) / 1000 * er2;
                  const liCO3P = num(inp.liCO3Price) > 0
                    ? num(inp.liCO3Price) / 1000 * er2
                    : c.liP;
                  const pr2    = c.pr;
                  // 함량: 사용자 입력 우선, 없으면 1시트 값
                  const niC2   = num(inp.chNiContent || inp.niContent) / 100;
                  const coC2   = num(inp.chCoContent || inp.coContent) / 100;
                  const liC2   = num(inp.chLiContent || inp.liContent) / 100;
                  const niChKg = niC2 * pr2 * (num(inp.niChPay)/100) * (niSO4P / 0.22);
                  const coChKg = coC2 * pr2 * (num(inp.coChPay)/100) * (coSO4P / 0.205);
                  const liChKg = liC2 * LI_CONV * pr2 * (num(inp.liChPay)/100) * liCO3P;
                  const totalCh = niChKg + coChKg + liChKg;
                  const chEquiv = c.totContained > 0
                    ? Math.round(totalCh / c.totContained * 10000) / 100 : NaN;
                  const hasInput = num(inp.niChPay)>0 || num(inp.coChPay)>0 || num(inp.liChPay)>0;
                  return (
                    <div style={{ padding:"12px 14px",
                      background: hasInput ? "#EFF6FF" : "#F8FAFC" }}>
                      <div style={{ display:"flex", justifyContent:"space-between",
                        alignItems:"center", marginBottom: hasInput ? 10 : 0 }}>
                        <div>
                          <div style={{ fontSize:11, color:C.muted, marginBottom:4 }}>중국 총지급액</div>
                          <div style={{ fontSize:20, fontWeight:800, color:C.text }}>
                            {hasInput ? f0(totalCh)+" ₩/kg" : "—"}
                          </div>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontSize:13, fontWeight:700, color:C.blue }}>
                            우리 기준 CoNiLi Rate 환산
                          </div>
                          <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>
                            = 총지급액 ÷ 전체 함량가치 (원재료 내)
                          </div>
                          <span style={{ fontSize:28, fontWeight:800,
                            color: !hasInput ? C.dim : C.blue }}>
                            {hasInput && !isNaN(chEquiv) ? fp(chEquiv, 1) : "—"}
                          </span>
                        </div>
                      </div>
                      {hasInput && (
                        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6 }}>
                          {[
                            { label:"Ni 기여", val:niChKg, color:"#1D4ED8" },
                            { label:"Co 기여", val:coChKg, color:C.amber },
                            { label:"Li 기여", val:liChKg, color:C.green },
                          ].map((item,i) => (
                            <div key={i} style={{ padding:"6px 8px", background:"#FFFFFF",
                              borderRadius:6, border:"1px solid #DBEAFE" }}>
                              <div style={{ fontSize:11, color:C.muted }}>{item.label}</div>
                              <div style={{ fontSize:13, fontWeight:700, color:item.color }}>
                                {f0(item.val)} ₩/kg
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            )}
          </div>

            </>
          )}

          {tab === 2 && (
            <Sheet3Boundary>
              <Sheet3Tab inp={inp} s={s} />
            </Sheet3Boundary>
          )}

          {tab === 3 && (
            <Sheet4Tab inp={inp} s={s} />
          )}

        </div>
      </div>
    </FxCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
    </script>
  </body>
</html>
