<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>우리사주 수익 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* 상단부터 채우기 */
      padding: 0; /* 바깥 여백 제거 */
      color: #fff;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: none;
      /* 핵심 변경 사항: 모든 화면에서 가로를 꽉 채우거나 적절히 확장되게 수정 */
      width: 100%;
      min-height: 100vh; /* 세로도 화면을 꽉 채우도록 설정 */
      max-width: 600px; /* 너무 퍼지지 않게 데스크톱 최대치만 상향 */
      padding: clamp(20px, 8vw, 40px);
      box-shadow: 0 0 100px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: clamp(22px, 7vw, 32px);
      font-weight: 700;
      text-align: center;
      margin: 10px 0 8px 0;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: rgba(255,255,255,0.45);
      font-size: clamp(14px, 4vw, 16px);
      text-align: center;
      margin-bottom: 30px;
    }

    /* 입력 섹션 크기 키움 */
    .input-group {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .input-label {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 15px;
      display: block;
    }

    .input-row {
      display: flex;
      align-items: center;
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(255,221,0,0.5);
      border-radius: 15px;
    }

    input[type="number"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #ffdd00;
      font-size: clamp(30px, 10vw, 42px); /* 숫자 크기 대폭 상향 */
      font-weight: 800;
      padding: 15px;
      width: 100%;
      text-align: right;
    }

    .currency-tag {
      color: #ffdd00;
      font-size: 20px;
      font-weight: 600;
      padding-right: 20px;
    }

    .quick-btns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 20px;
    }
    .quick-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      padding: 12px 0;
      cursor: pointer;
    }

    /* 그리드 항목 가독성 상향 */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .info-item {
      background: rgba(255,255,255,0.06);
      border-radius: 15px;
      padding: 16px;
    }
    .info-item .label { color: rgba(255,255,255,0.5); font-size: 12px; margin-bottom: 6px; }
    .info-item .value { font-size: clamp(15px, 4.5vw, 18px); font-weight: 600; }

    .result-section {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      font-size: clamp(14px, 4vw, 17px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .result-row:last-child { border-bottom: none; }

    .profit-box {
      background: linear-gradient(135deg, rgba(0,230,118,0.25), rgba(0,230,118,0.1));
      border: 1px solid rgba(0,230,118,0.4);
      border-radius: 24px;
      padding: clamp(30px, 8vw, 40px) 20px;
      text-align: center;
    }
    .profit-box.loss {
      background: linear-gradient(135deg, rgba(255,82,82,0.25), rgba(255,82,82,0.1));
      border-color: rgba(255,82,82,0.4);
    }

    .profit-amount {
      font-size: clamp(36px, 11vw, 50px); /* 수익금 강조 */
      font-weight: 800;
      color: #00e676;
      margin-bottom: 8px;
    }
    .profit-amount.loss { color: #ff5252; }

    .profit-rate { font-size: 16px; font-weight: 600; opacity: 0.9; }
    
    footer {
      margin-top: auto; /* 하단으로 밀기 */
      padding: 30px 0 10px 0;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>🏢 우리사주 수익 계산기</h1>
  <p class="subtitle">현재가를 입력하면 실시간 수익을 계산합니다</p>

  <div class="input-group">
    <span class="input-label">실시간 주가 입력</span>
    <div class="input-row">
      <input type="number" id="currentPrice" value="100000" oninput="calculate()" pattern="\d*">
      <span class="currency-tag">원</span>
    </div>
    <div class="quick-btns">
      <button class="quick-btn" onclick="setPrice(50000)">5만</button>
      <button class="quick-btn" onclick="setPrice(70000)">7만</button>
      <button class="quick-btn" onclick="setPrice(100000)">10만</button>
      <button class="quick-btn" onclick="setPrice(150000)">15만</button>
    </div>
  </div>

  <div class="info-grid">
    <div class="info-item"><div class="label">보유 주식</div><div class="value">1,893 주</div></div>
    <div class="info-item"><div class="label">취득 단가</div><div class="value">50,000 원</div></div>
    <div class="info-item"><div class="label">총 대출액</div><div class="value" style="color:#ff8a8a">6,160만</div></div>
    <div class="info-item"><div class="label">타인 주식</div><div class="value">600 주</div></div>
  </div>

  <div class="result-section">
    <div class="result-row"><span class="r-label">보유분 평가액</span><span id="holdingValue">—</span></div>
    <div class="result-row"><span class="r-label">타인분 평가액</span><span id="otherValue">—</span></div>
    <div class="result-row" style="font-weight:700;"><span class="r-label">합계</span><span id="totalValue">—</span></div>
  </div>

  <div class="profit-box" id="profitBox">
    <div style="font-size:14px; opacity:0.8; margin-bottom:10px;">🎯 순 수익 (보유분 - 대출액)</div>
    <div class="profit-amount" id="profitAmount">—</div>
    <div class="profit-rate" id="profitRate"></div>
  </div>

  <footer>
    데이터 기준: 취득가 50,000원 / 대출 6,160만원<br>
    © 2024 Stock Calculator
  </footer>
</div>

<script>
  const MY_SHARES      = 1893;
  const OTHER_SHARES   = 600;
  const ACQUIRE_PRICE  = 50000;
  const LOAN_AMOUNT    = 61600000;

  function fmt(n) {
    return new Intl.NumberFormat('ko-KR').format(n) + ' 원';
  }

  function setPrice(p) {
    document.getElementById('currentPrice').value = p;
    calculate();
  }

  function calculate() {
    const price = parseFloat(document.getElementById('currentPrice').value) || 0;
    const holdingVal  = MY_SHARES * price;
    const otherVal    = OTHER_SHARES * price;
    const totalVal    = holdingVal + otherVal;
    const profit      = holdingVal - LOAN_AMOUNT;
    const costBase    = MY_SHARES * ACQUIRE_PRICE;
    const rateVsCost  = costBase > 0 ? ((profit / costBase) * 100) : 0;

    document.getElementById('holdingValue').textContent = fmt(holdingVal);
    document.getElementById('otherValue').textContent   = fmt(otherVal);
    document.getElementById('totalValue').textContent   = fmt(totalVal);

    const amtEl   = document.getElementById('profitAmount');
    const rateEl  = document.getElementById('profitRate');
    const boxEl   = document.getElementById('profitBox');

    amtEl.textContent  = (profit >= 0 ? '+' : '') + fmt(profit);
    rateEl.textContent = (rateVsCost >= 0 ? '+' : '') + rateVsCost.toFixed(1) + '% (원가대비)';

    if (profit >= 0) {
      amtEl.classList.remove('loss');
      boxEl.classList.remove('loss');
    } else {
      amtEl.classList.add('loss');
      boxEl.classList.add('loss');
    }
  }
  calculate();
</script>
</body>
</html>
