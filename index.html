<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>우리사주 수익 계산기 Pro</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --primary: #fbbf24; /* Gold */
      --success: #10b981; /* Green */
      --danger: #ef4444;  /* Red */
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    html, body { 
      background-color: var(--bg-color); 
      width: 100%; 
      height: 100%;
      color: var(--text-main);
      font-family: 'Pretendard', -apple-system, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-y: auto;
      padding: 20px 10px;
    }

    /* 모든 기기 대응 컨테이너 */
    .app-container {
      width: 100%;
      max-width: 700px; /* PC에서도 적당한 넓이 */
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    header { text-align: center; margin-bottom: 10px; }
    header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.05em; margin-bottom: 5px; }
    header p { color: var(--text-muted); font-size: 0.9rem; }

    /* 카드 공통 스타일 */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
    }

    /* 입력 섹션 강화 */
    .input-section { border: 2px solid rgba(251, 191, 36, 0.3); }
    .label-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .label-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
    
    .input-wrapper {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 16px;
      display: flex;
      align-items: center;
      padding: 15px 20px;
      border: 2px solid transparent;
      transition: all 0.3s;
    }
    .input-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1); }

    input[type="number"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--primary);
      font-size: 2.5rem; /* 대폭 키움 */
      font-weight: 800;
      width: 100%;
      text-align: right;
      font-family: 'Pretendard', sans-serif;
      caret-color: var(--primary); /* 커서 색상 */
      line-height: 1.2;
    }
    .unit-text { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-left: 10px; }

    /* 퀵 버튼 그리드 (화면 폭에 따라 버튼 크기 조절) */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }
    .quick-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: var(--text-main);
      padding: 12px 5px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .quick-btn:hover { background: var(--primary); color: #000; }
    .quick-btn:active { transform: scale(0.95); }

    /* 정보 그리드 - 폴드/윈도우에서 2열로 자동 변경 */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }
    .info-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 18px;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .info-item .tag { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }
    .info-item .val { font-size: 1.1rem; font-weight: 700; }

    /* 상세 명세 리스트 */
    .detail-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 5px 0;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row span:first-child { color: var(--text-muted); font-size: 0.95rem; }
    .detail-row span:last-child { font-weight: 600; }

    /* 수익 결과 하이라이트 */
    .profit-card {
      text-align: center;
      padding: 40px 20px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .profit-card.plus { background: linear-gradient(135deg, #065f46 0%, #064e3b 100%); border-color: var(--success); }
    .profit-card.minus { background: linear-gradient(135deg, #991b1b 0%, #7f1d1d 100%); border-color: var(--danger); }

    .profit-label { font-size: 0.9rem; font-weight: 700; opacity: 0.8; margin-bottom: 10px; }
    .profit-value { font-size: 3.2rem; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 5px; }
    .profit-percent { font-size: 1.2rem; font-weight: 700; background: rgba(0,0,0,0.2); display: inline-block; padding: 5px 15px; border-radius: 100px; }

    footer { text-align: center; color: var(--text-muted); font-size: 0.75rem; padding: 20px 0; line-height: 1.6; }

    /* 스핀 버튼 제거 */
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body>

<div class="app-container">
  <header>
    <h1>🏢 우리사주 계산기 Pro</h1>
    <p>실시간 현재가 기준 수익 현황</p>
  </header>

  <section class="glass-card input-section">
    <div class="label-group">
      <label>실시간 주가 입력</label>
      <span style="color: var(--primary); font-size: 0.7rem; font-weight: 800;">LIVE</span>
    </div>
    <div class="input-wrapper">
      <input type="number" id="currentPrice" value="100000" oninput="calculate()" placeholder="0">
      <span class="unit-text">원</span>
    </div>
    <div class="quick-actions">
      <button class="quick-btn" onclick="setPrice(50000)">50,000</button>
      <button class="quick-btn" onclick="setPrice(70000)">70,000</button>
      <button class="quick-btn" onclick="setPrice(100000)">100,000</button>
      <button class="quick-btn" onclick="setPrice(130000)">130,000</button>
      <button class="quick-btn" onclick="setPrice(150000)">150,000</button>
      <button class="quick-btn" onclick="setPrice(200000)">200,000</button>
    </div>
  </section>

  <section class="info-grid">
    <div class="info-item">
      <span class="tag">나의 보유 주식</span>
      <span class="val">1,893 주</span>
    </div>
    <div class="info-item">
      <span class="tag">취득 단가</span>
      <span class="val">50,000 원</span>
    </div>
    <div class="info-item">
      <span class="tag">총 대출 금액</span>
      <span class="val" style="color: #fda4af;">6,160만 원</span>
    </div>
    <div class="info-item">
      <span class="tag">기타(타인) 주식</span>
      <span class="val">600 주</span>
    </div>
  </section>

  <section class="glass-card">
    <div class="detail-list">
      <div class="detail-row"><span>보유분 평가 금액</span><span id="holdingValue">—</span></div>
      <div class="detail-row"><span>기타분 평가 금액</span><span id="otherValue">—</span></div>
      <div class="detail-row"><span style="color: var(--text-main); font-weight: 700;">전체 합계</span><span id="totalValue" style="color: var(--primary);">—</span></div>
    </div>
  </section>

  <section class="glass-card profit-card" id="profitBox">
    <div class="profit-label">🎯 예상 순 수익 (보유분 - 대출)</div>
    <div class="profit-value" id="profitAmount">—</div>
    <div class="profit-percent" id="profitRate">0%</div>
  </section>

  <footer>
    본 계산은 보유 주식 1,893주 및 대출 원금 6,160만원을 기준으로 합니다.<br>
    © 2026 Stock Insight Portfolio.
  </footer>
</div>

<script>
  const MY_SHARES      = 1893;
  const OTHER_SHARES   = 600;
  const ACQUIRE_PRICE  = 50000;
  const LOAN_AMOUNT    = 61600000;

  function fmt(n) {
    return new Intl.NumberFormat('ko-KR').format(n) + ' 원';
  }

  function setPrice(p) {
    const input = document.getElementById('currentPrice');
    input.value = p;
    calculate();
    // 입력창에 포커스 주어 활성화 상태 표시
    input.focus();
  }

  function calculate() {
    const input = document.getElementById('currentPrice');
    const price = parseFloat(input.value) || 0;

    const holdingVal  = MY_SHARES * price;
    const otherVal    = OTHER_SHARES * price;
    const totalVal    = holdingVal + otherVal;
    const profit      = holdingVal - LOAN_AMOUNT;
    const costBase    = MY_SHARES * ACQUIRE_PRICE;
    const rateVsCost  = costBase > 0 ? ((profit / costBase) * 100) : 0;

    // 평가금액 업데이트
    document.getElementById('holdingValue').textContent = fmt(holdingVal);
    document.getElementById('otherValue').textContent   = fmt(otherVal);
    document.getElementById('totalValue').textContent   = fmt(totalVal);

    // 수익 결과 업데이트
    const amtEl   = document.getElementById('profitAmount');
    const rateEl  = document.getElementById('profitRate');
    const boxEl   = document.getElementById('profitBox');

    amtEl.textContent  = (profit >= 0 ? '+' : '') + fmt(profit);
    rateEl.textContent = (rateVsCost >= 0 ? '+' : '') + rateVsCost.toFixed(1) + '% (원가대비)';

    if (profit >= 0) {
      boxEl.className = 'glass-card profit-card plus';
    } else {
      boxEl.className = 'glass-card profit-card minus';
    }
  }

  // 초기 실행
  calculate();
</script>

</body>
</html>
