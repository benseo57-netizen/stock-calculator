<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>우리사주 수익 계산기</title>
  <style>
    /* 기본 초기화 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background-color: #1a1a2e; width: 100%; overflow-x: hidden; }

    body {
      font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
      color: #fff;
      display: block;
      -webkit-font-smoothing: antialiased;
    }

    /* 좌우 여백을 최소화 (16px -> 8px) 하여 화면을 꽉 채움 */
    .container {
      width: 100%;
      max-width: 600px; /* 데스크톱에서 조금 더 넓게 */
      margin: 0 auto;
      padding: 16px 8px 40px 8px; /* 양옆 여백을 8px로 대폭 축소 */
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-bottom: 20px;
    }

    /* 1. 주가 입력 섹션 (내부 여백도 줄여서 입력칸을 최대로 키움) */
    .input-section {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px 12px; /* 좌우 패딩 축소 */
      margin-bottom: 12px;
    }

    .input-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
      display: block;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: #000;
      border: 3px solid #ffdd00;
      border-radius: 12px;
      padding: 12px 14px;
    }

    input[type="number"] {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      outline: none;
      color: #ffdd00;
      font-size: clamp(34px, 10vw, 42px); /* 숫자 크기 상향 */
      font-weight: 900;
      text-align: right;
      font-family: inherit;
    }

    .unit {
      color: #ffdd00;
      font-size: 20px;
      font-weight: 700;
      margin-left: 6px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 12px;
    }
    .btn {
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      color: #fff;
      padding: 12px 0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:active { background: #ffdd00; color: #000; }

    /* 2. 기본 정보 카드 (좌우 꽉 차게) */
    .info-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .info-card {
      background: rgba(255,255,255,0.04);
      padding: 14px 12px;
      border-radius: 12px;
    }
    .info-card .label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
    .info-card .value { font-size: clamp(15px, 4vw, 17px); font-weight: 700; }

    /* 3. 평가액 리스트 */
    .detail-list {
      background: rgba(255,255,255,0.03);
      border-radius: 14px;
      padding: 4px 14px;
      margin-bottom: 12px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 15px;
    }
    .row:last-child { border-bottom: none; }
    .row .label { color: rgba(255,255,255,0.5); }
    .row .val { font-weight: 600; }

    /* 4. 최종 수익 박스 */
    .summary-box {
      background: linear-gradient(135deg, #00c853 0%, #1b5e20 100%);
      border-radius: 16px;
      padding: 28px 12px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    }
    .summary-box.loss {
      background: linear-gradient(135deg, #ff5252 0%, #b71c1c 100%);
    }

    .res-label { font-size: 13px; margin-bottom: 6px; font-weight: 600; opacity: 0.9; }
    .res-amount { font-size: clamp(36px, 11vw, 48px); font-weight: 900; margin-bottom: 4px; letter-spacing: -1px; }
    .res-rate { font-size: 16px; font-weight: 700; }

    footer {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      margin-top: 20px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🏢 우리사주 계산기</h1>
  <p class="subtitle">실시간 수익 현황</p>

  <div class="input-section">
    <span class="input-label">실시간 주가 입력 (원)</span>
    <div class="input-wrapper">
      <input type="number" id="currentPrice" value="100000" oninput="calculate()" pattern="\d*">
      <span class="unit">원</span>
    </div>
    <div class="quick-grid">
      <button class="btn" onclick="setPrice(50000)">5만</button>
      <button class="btn" onclick="setPrice(70000)">7만</button>
      <button class="btn" onclick="setPrice(100000)">10만</button>
      <button class="btn" onclick="setPrice(150000)">15만</button>
    </div>
  </div>

  <div class="info-container">
    <div class="info-card"><div class="label">보유 주식</div><div class="value">1,893 주</div></div>
    <div class="info-card"><div class="label">취득 단가</div><div class="value">50,000 원</div></div>
    <div class="info-card"><div class="label">총 대출액</div><div class="value" style="color:#ff8a8a">6,160만 원</div></div>
    <div class="info-card"><div class="label">타인 주식</div><div class="value">600 주</div></div>
  </div>

  <div class="detail-list">
    <div class="row"><span class="label">보유분 평가액</span><span class="val" id="holdingValue">—</span></div>
    <div class="row"><span class="label">타인분 평가액</span><span class="val" id="otherValue">—</span></div>
    <div class="row" style="border:none;"><span class="label" style="color:#fff; font-weight:700;">전체 합계</span><span class="val" id="totalValue" style="color:#ffdd00;">—</span></div>
  </div>

  <div class="summary-box" id="profitBox">
    <div class="res-label">🎯 예상 순 수익 (보유분 - 대출)</div>
    <div class="res-amount" id="profitAmount">—</div>
    <div class="res-rate" id="profitRate"></div>
  </div>

  <footer>
    데이터 기준: 취득가 50,000원 / 대출 6,160만원<br>
    © 2026 Stock Calculator
  </footer>
</div>

<script>
  const MY_SHARES      = 1893;
  const OTHER_SHARES   = 600;
  const ACQUIRE_PRICE  = 50000;
  const LOAN_AMOUNT    = 61600000;

  function fmt(n) { return new Intl.NumberFormat('ko-KR').format(n) + ' 원'; }

  function setPrice(p) {
    document.getElementById('currentPrice').value = p;
    calculate();
  }

  function calculate() {
    const price = parseFloat(document.getElementById('currentPrice').value) || 0;
    const holdingVal  = MY_SHARES * price;
    const otherVal    = OTHER_SHARES * price;
    const totalVal    = holdingVal + otherVal;
    const profit      = holdingVal - LOAN_AMOUNT;
    const costBase    = MY_SHARES * ACQUIRE_PRICE;
    const rateVsCost  = costBase > 0 ? ((profit / costBase) * 100) : 0;

    document.getElementById('holdingValue').textContent = fmt(holdingVal);
    document.getElementById('otherValue').textContent   = fmt(otherVal);
    document.getElementById('totalValue').textContent   = fmt(totalVal);

    const amtEl   = document.getElementById('profitAmount');
    const rateEl  = document.getElementById('profitRate');
    const boxEl   = document.getElementById('profitBox');

    amtEl.textContent  = (profit >= 0 ? '+' : '') + fmt(profit);
    rateEl.textContent = (rateVsCost >= 0 ? '+' : '') + rateVsCost.toFixed(1) + '% (원가대비)';

    if (profit >= 0) {
      boxEl.classList.remove('loss');
    } else {
      boxEl.classList.add('loss');
    }
  }
  calculate();
</script>

</body>
</html>
